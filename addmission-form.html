<!DOCTYPE html>
<html>
<head>
    <title>College Admission Form</title>
</head>
<body>

    <h1>College Admission Form</h1>

    <form>

        <label>Student Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile"><br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea><br><br>

        <label>Course Applied For:</label><br>
        <select name="course">
            <option>B.Tech</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>B.Sc</option>
            <option>MCA</option>
        </select><br><br>
        
        <label>10th Percentage:</label><br>
        <input type="number" name="percentage" min="0" max="100"><br><br>

        <label>Upload Marksheet:</label><br>
        <input type="file" name="marksheet"><br><br>

        <label>12th Percentage:</label><br>
        <input type="number" name="percentage" min="0" max="100"><br><br>

        <label>Upload Marksheet:</label><br>
        <input type="file" name="marksheet"><br><br>

        <label>Aadhaar Number:</label><br>
        <input type="text" name="aadhaar"><br><br>

        

        <input type="checkbox" required>
        I confirm that the information provided is correct.
        <br><br>

        <input type="submit" value="Submit Application">
        

    </form>

</body>
</html>
